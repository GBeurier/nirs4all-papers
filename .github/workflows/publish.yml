name: Publish to PyPI

# Publishes the n4a-papers publisher to PyPI on a GitHub Release, via PyPI Trusted Publishing
# (OIDC — no API token stored). One-time setup on PyPI: add a trusted publisher for project
# "nirs4all-papers" → this repo → workflow "publish.yml" → environment "pypi".
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = build only (no publish)"
        type: string
        default: "true"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Smoke-check the wheel
        run: |
          python -m pip install dist/*.whl
          n4a-papers --version
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.dry_run == 'false'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
